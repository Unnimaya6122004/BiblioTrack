# Server
server.port=${SERVER_PORT:8080}

# Load local .env (project root) as a properties source
spring.config.import=optional:file:.env[.properties]

# JWT
jwt.secret=${JWT_SECRET:}

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432}/${DB_NAME:postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:post123}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=existing_schema_baseline

# Dev admin seed (created only if email does not exist)
app.seed-admin.enabled=true
app.seed-admin.name=System Admin
app.seed-admin.email=admin@lms.local
app.seed-admin.password=Admin@123
app.seed-admin.reset-password-if-exists=true

# Dev member seed
app.seed-member.enabled=true
app.seed-member.name=Library Member
app.seed-member.email=member@lms.local
app.seed-member.password=Member@123
app.seed-member.reset-password-if-exists=true
